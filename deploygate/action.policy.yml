name: "DeployGate Policy Check"
description: "Evaluate a deployment policy and block the workflow if conditions are not met."
author: "deploygate"

inputs:
  checklist:
    description: "Path to the checklist Python file"
    required: true
  rule_name:
    description: "Name of the policy rule (used in output messages)"
    required: false
    default: "default"
  min_pass_rate:
    description: "Minimum required pass rate as a decimal (0.0–1.0)"
    required: false
    default: "1.0"
  required_checks:
    description: "Space-separated list of check names that must pass"
    required: false
    default: ""
  block_on_error:
    description: "Block the deploy when any check raises an error (true/false)"
    required: false
    default: "true"
  json_output:
    description: "Emit the result as JSON to stdout (true/false)"
    required: false
    default: "false"

outputs:
  allowed:
    description: "'true' if the policy allows the deployment, 'false' otherwise"
  reasons:
    description: "Comma-separated list of reasons the policy was blocked (empty when allowed)"

runs:
  using: "composite"
  steps:
    - name: Install deploygate
      shell: bash
      run: pip install deploygate

    - name: Evaluate policy
      shell: bash
      id: policy
      run: |
        EXTRA_FLAGS=""
        if [ "${{ inputs.block_on_error }}" = "false" ]; then
          EXTRA_FLAGS="$EXTRA_FLAGS --no-block-on-error"
        fi
        if [ "${{ inputs.json_output }}" = "true" ]; then
          EXTRA_FLAGS="$EXTRA_FLAGS --json"
        fi
        REQUIRED=""
        if [ -n "${{ inputs.required_checks }}" ]; then
          REQUIRED="--required-checks ${{ inputs.required_checks }}"
        fi
        deploygate-policy \
          "${{ inputs.checklist }}" \
          --rule-name "${{ inputs.rule_name }}" \
          --min-pass-rate "${{ inputs.min_pass_rate }}" \
          $REQUIRED \
          $EXTRA_FLAGS
        echo "allowed=$?" >> "$GITHUB_OUTPUT"
